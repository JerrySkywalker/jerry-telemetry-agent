name: Feature request
description: Propose an agent feature or workflow improvement.
title: "feat: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What should this improve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should change?
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope boundaries
      description: What is explicitly out of scope?
  - type: textarea
    id: validation
    attributes:
      label: Validation plan
  - type: checkboxes
    id: deployment
    attributes:
      label: Deployment impact
      options:
        - label: This does not deploy to LAX or modify the production hub without explicit manual approval.
          required: true
