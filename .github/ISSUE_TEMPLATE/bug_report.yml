name: Bug report
description: Report a defect in the telemetry agent.
title: "fix: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      placeholder: |
        1. Run ...
        2. Observe ...
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Validation evidence
      description: Commands, logs with secrets removed, or test output.
  - type: checkboxes
    id: safety
    attributes:
      label: Safety checks
      options:
        - label: No real secrets, raw auth.json, access tokens, refresh tokens, emails, account IDs, or user IDs are included.
          required: true
